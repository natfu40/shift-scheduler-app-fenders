# Test Environment Configuration - Memory Optimized
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for Tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Connection Pool Optimization for Tests
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.connection-timeout=5000

# Security configuration - Use correct property names with 512+ bit key
jwt.secret=testSecretKeyForTesting123456789012345678901234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ
jwt.expiration=3600000

# Logging Configuration (reduced for memory)
logging.level.root=WARN
logging.level.com.shiftscheduler=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.testcontainers=WARN
logging.level.com.zaxxer.hikari=ERROR
logging.level.org.hibernate=WARN

# Disable unnecessary features in tests
management.endpoints.enabled-by-default=false
spring.devtools.restart.enabled=false

# TestContainers Configuration
testcontainers.reuse.enable=true

# Jackson Configuration
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false
