spring.application.name=shift-scheduler-backend
logging.level.com.shiftscheduler=DEBUG
logging.level.root=INFO
# Logging

jwt.expiration=86400000
jwt.secret=your-secret-key-change-in-production-at-least-32-characters-long!!!
# JWT Configuration

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
# JPA/Hibernate Configuration

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.password=root
spring.datasource.username=root
spring.datasource.url=jdbc:mariadb://localhost:3306/shift_scheduler
# Database Configuration

server.port=8080
# Server Configuration

spring.profiles.active=dev

# Jackson JSON serialization configuration
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
spring.jackson.serialization.write-dates-as-timestamps=false
# JSON Configuration

