# Development Configuration for Shift Scheduler
spring.application.name=shift-scheduler-backend
spring.profiles.active=dev

# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/shift_scheduler
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=development-secret-key-change-in-production-at-least-32-characters-long!!!
jwt.expiration=86400000

# Logging Configuration
logging.level.root=INFO
logging.level.com.shiftscheduler=DEBUG
logging.level.org.springframework.security=WARN

# Jackson JSON Configuration
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

# Development Settings
server.error.include-stacktrace=on_param
server.error.include-message=always
spring.jackson.serialization.write-dates-as-timestamps=false
# JSON Configuration

