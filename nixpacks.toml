# Railway Nixpacks configuration for Java Spring Boot backend
[phases.setup]
nixPkgs = ['maven', 'openjdk17']

[phases.build]
cmd = 'mvn clean package -DskipTests -B && echo "Build completed - checking for JAR:" && ls -la target/'

[phases.start]
cmd = 'java -server -XX:+UseContainerSupport -XX:MaxRAMPercentage=70.0 -XX:InitialRAMPercentage=50.0 -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+UnlockExperimentalVMOptions -XX:+UseJVMCICompiler -Djava.security.egd=file:/dev/./urandom -Dspring.profiles.active=railway -jar target/shift-scheduler-backend-1.0.0.jar'

