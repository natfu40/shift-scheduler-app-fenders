# Railway Production Configuration
spring.application.name=shift-scheduler-backend

# Server Configuration - Railway assigns PORT automatically
server.port=${PORT:8080}

# Database Configuration - handled by RailwayDataSourceConfig.java
# Railway provides DATABASE_URL environment variable which is processed by our config class

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool Settings for Railway
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=30000

# JWT Configuration - REQUIRED environment variable
# IMPORTANT: JWT_SECRET must be at least 512 bits (64 characters) for HS512 algorithm
# Generate with: openssl rand -base64 64
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Jackson JSON Configuration
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
spring.jackson.serialization.write-dates-as-timestamps=false

# Production Optimizations
spring.jpa.open-in-view=false

# Logging Configuration for Railway
logging.level.root=INFO
logging.level.com.shiftscheduler=INFO
logging.level.org.springframework.security=WARN

# Actuator for Railway health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.readinessstate.enabled=true
management.health.livenessstate.enabled=true
management.endpoints.web.base-path=/actuator
management.server.port=${PORT:8080}

# CORS Configuration
# Set ALLOWED_ORIGINS environment variable on Railway to specify frontend domains
# Example: https://your-frontend.vercel.app,https://your-custom-domain.com

